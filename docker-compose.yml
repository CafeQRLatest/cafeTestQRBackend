services:
  # Backend Service
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/pos_db
      - SPRING_DATASOURCE_USERNAME=pos_user
      - SPRING_DATASOURCE_PASSWORD=pos_password
      - JWT_SECRET=${JWT_SECRET:-your_fallback_secret_for_development}
    depends_on:
      - db
      - redis
      - rabbitmq

  # Database Service
  db:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=pos_db
      - POSTGRES_USER=pos_user
      - POSTGRES_PASSWORD=pos_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis Service
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # RabbitMQ Service
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data:
